name: campusone
description: "CampusOne - A modern SaaS-based University ERP platform built with Flutter."
publish_to: "none"

version: 1.0.2+3

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  pdf: ^3.11.1
  printing: ^5.13.4
  excel: ^4.0.6
  path_provider: ^2.1.5
  open_filex: ^4.5.0
  provider: ^6.1.5
  fl_chart: ^0.68.0
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0

  # Icons
  cupertino_icons: ^1.0.8

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.2.0
  lottie: ^3.1.2

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Navigation
  go_router: ^16.0.0

  # Networking
  dio: ^5.9.0

  # Dependency Injection
  get_it: ^8.2.0

  # Local Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # Utilities
  intl: ^0.20.2
  connectivity_plus: ^7.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/
    - assets/animations/
    - assets/illustrations/

dev_dependencies:
  flutter_launcher_icons: ^0.14.3  

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/campusone_logo.png"
